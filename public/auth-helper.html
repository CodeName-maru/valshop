<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Riot Auth Helper</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 50px auto; padding: 20px; }
    .token-box { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 20px 0; word-break: break-all; }
    button { background: #0f62fe; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0353e9; }
    .error { color: #da1e28; }
    .success { color: #198038; }
    #loading { display: none; }
  </style>
</head>
<body>
  <h1>🎮 Riot 토큰 받기 (개발용)</h1>

  <p>Riot 계정으로 로그인하여 access_token을 가져옵니다.</p>

  <button id="loginBtn" onclick="startAuth()">Riot 로그인 시작</button>

  <div id="loading">로그인 중...</div>

  <div id="result" style="display:none;">
    <p class="success">✅ 토큰을 받았습니다!</p>
    <p>아래 버튼을 클릭하여 VAL-Shop으로 토큰을 전달하세요:</p>
    <button onclick="sendToApp()">VAL-Shop으로 토큰 보내기</button>
  </div>

  <p id="error" class="error" style="display:none;"></p>

  <script>
    const APP_URL = 'http://localhost:3000';
    let receivedToken = null;

    // URL fragment에서 access_token 추출
    function parseTokenFromHash() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return params.get('access_token');
    }

    // 페이지 로드 시 토큰 확인 (Riot 리다이렉트 후)
    window.addEventListener('load', () => {
      const token = parseTokenFromHash();
      if (token) {
        receivedToken = token;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('loginBtn').style.display = 'none';
        // URL 정리
        history.replaceState(null, '', window.location.pathname);
      }
    });

    function startAuth() {
      const state = crypto.randomUUID();
      sessionStorage.setItem('riot_state', state);

      const params = new URLSearchParams({
        client_id: 'play-valorant-web-prod',
        response_type: 'token',
        scope: 'account',
        state: state,
        redirect_uri: window.location.origin + window.location.pathname
      });

      window.location.href = `https://auth.riotgames.com/authorize?${params.toString()}`;
    }

    function sendToApp() {
      if (!receivedToken) return;

      // opener가 있으면 postMessage로 전달
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'riot_token', token: receivedToken }, APP_URL);
        window.close();
      } else {
        // fallback: 현재 창에서 앱으로 리다이렉트하며 토큰 전달
        window.location.href = `${APP_URL}/api/auth/manual?token=${encodeURIComponent(receivedToken)}`;
      }
    }

    // postMessage 리스너 (팝업으로 열린 경우)
    window.addEventListener('message', (event) => {
      if (event.origin !== APP_URL) return;
      if (event.data.type === 'request_token') {
        startAuth();
      }
    });
  </script>
</body>
</html>
